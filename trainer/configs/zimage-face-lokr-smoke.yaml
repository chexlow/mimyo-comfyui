# Smoke test — Z-Image LoKr 호환성 / VRAM / Blackwell 호환 검증용.
# 50 step, sample 1회. 산출 .safetensors 가 ComfyUI/diffusers 에서
# Z-Image-Turbo 에 정상 로드되는지 외부에서 검증한다.
#
# envsubst 가 ${VAR} 를 치환한다. (entrypoint.sh 에서 export 됨)

job: extension
config:
  name: ${RUN_ID}
  process:
    - type: sd_trainer
      training_folder: ${OUTPUT_DIR}
      sqlite_db_path: ${OUTPUT_DIR}/runs.db
      device: cuda:0
      trigger_word: ${TRIGGER_TOKEN}

      network:
        type: lokr
        lokr_full_rank: true
        lokr_factor: 8
        linear: 32
        linear_alpha: 32

      save:
        dtype: float16
        save_every: 50
        max_step_saves_to_keep: 2
        push_to_hub: false

      datasets:
        - folder_path: ${DATASET_DIR}
          caption_ext: txt
          caption_dropout_rate: 0.0
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [1024]

      train:
        batch_size: 1
        steps: 50
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: flowmatch
        optimizer: adamw8bit
        lr: 1e-4
        ema_config:
          use_ema: false
        dtype: bf16

      model:
        name_or_path: ${BASE_DIR}
        is_flux: false
        quantize: true
        quantize_te: true

      sample:
        sampler: flowmatch
        sample_every: 50
        width: 1024
        height: 1024
        prompts:
          - "${TRIGGER_TOKEN}, head and shoulders portrait, plain white t-shirt, soft natural light, neutral background, looking at camera"
        neg: ""
        seed: 42
        walk_seed: false
        guidance_scale: 1.0
        sample_steps: 20
